services:
  nats:
    image: nats:2.10-alpine
    container_name: fedsentinel-nats
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["-js", "-m", "8222"]
    networks: [fedsentinel_net]

  minio:
    image: minio/minio:latest
    container_name: fedsentinel-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - fedsentinel_minio_data:/data
    networks: [fedsentinel_net]

  minio-mc:
    image: minio/mc:latest
    container_name: fedsentinel-minio-mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      chmod +x /scripts/init_minio.sh &&
      /scripts/init_minio.sh &&
      tail -f /dev/null
      "
    volumes:
      - ../scripts:/scripts
    networks: [fedsentinel_net]

  nessie:
    image: ghcr.io/projectnessie/nessie:latest
    container_name: fedsentinel-nessie
    ports:
      - "19120:19120"
    environment:
      QUARKUS_HTTP_PORT: 19120
      NESSIE_VERSION_STORE_TYPE: IN_MEMORY
    networks: [fedsentinel_net]

  spark-iceberg:
    image: tabulario/spark-iceberg:latest
    container_name: fedsentinel-spark-iceberg
    depends_on:
      - minio
      - nessie
    ports:
      - "8888:8888"
      - "4040:4040"
    environment:
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
    volumes:
      - ../scripts:/opt/spark/scripts
    networks: [fedsentinel_net]
    command: ["bash", "-lc", "tail -f /dev/null"]

  central-ingestor:
    build:
      context: ../central
    container_name: fedsentinel-central-ingestor
    depends_on:
      - nats
    environment:
      NATS_URL: nats://fedsentinel-nats:4222
      NATS_SUBJECT: fedsentinel.edge.insights
      INBOX_PATH: /data/inbox/edge_insights.jsonl
    volumes:
      - fedsentinel_inbox:/data/inbox
    networks: [fedsentinel_net]

  # ======================
  # Shared Ollama (single model runtime for local dev)
  # ======================
  ollama:
    image: ollama/ollama:latest
    container_name: fedsentinel-ollama
    command: ["serve"]
    volumes:
      - ollama_data:/root/.ollama
    networks: [fedsentinel_net]

  ollama-pull:
    image: alpine:3.20
    container_name: fedsentinel-ollama-pull
    depends_on:
      - ollama
    networks: [fedsentinel_net]
    entrypoint: ["/bin/sh", "-lc"]
    environment:
      OLLAMA_HOST: fedsentinel-ollama
      OLLAMA_PORT: "11434"
      OLLAMA_MODEL: tinyllama:latest
    volumes:
      - ../scripts:/scripts:ro
    command: ["apk add --no-cache curl && /scripts/ollama_pull.sh"]

  # ======================
  # Edge nodes (5)
  # ======================
  edge-node-1:
    build:
      context: ../edge
    container_name: fedsentinel-edge-node-1
    depends_on:
      - nats
      - ollama
      - ollama-pull
    environment:
      NODE_ID: edge-1
      REGION: us-east
      OLLAMA_MODEL: tinyllama:latest
      OLLAMA_URL: http://fedsentinel-ollama:11434
      NATS_URL: nats://fedsentinel-nats:4222
      NATS_SUBJECT: fedsentinel.edge.insights
      INTERVAL_SEC: "45"
    networks: [fedsentinel_net]

  edge-node-2:
    build:
      context: ../edge
    container_name: fedsentinel-edge-node-2
    depends_on:
      - nats
      - ollama
      - ollama-pull
    environment:
      NODE_ID: edge-2
      REGION: eu-west
      OLLAMA_MODEL: tinyllama:latest
      OLLAMA_URL: http://fedsentinel-ollama:11434
      NATS_URL: nats://fedsentinel-nats:4222
      NATS_SUBJECT: fedsentinel.edge.insights
      INTERVAL_SEC: "45"
    networks: [fedsentinel_net]

  edge-node-3:
    build:
      context: ../edge
    container_name: fedsentinel-edge-node-3
    depends_on:
      - nats
      - ollama
      - ollama-pull
    environment:
      NODE_ID: edge-3
      REGION: ap-south
      OLLAMA_MODEL: tinyllama:latest
      OLLAMA_URL: http://fedsentinel-ollama:11434
      NATS_URL: nats://fedsentinel-nats:4222
      NATS_SUBJECT: fedsentinel.edge.insights
      INTERVAL_SEC: "45"
    networks: [fedsentinel_net]

  edge-node-4:
    build:
      context: ../edge
    container_name: fedsentinel-edge-node-4
    depends_on:
      - nats
      - ollama
      - ollama-pull
    environment:
      NODE_ID: edge-4
      REGION: us-west
      OLLAMA_MODEL: tinyllama:latest
      OLLAMA_URL: http://fedsentinel-ollama:11434
      NATS_URL: nats://fedsentinel-nats:4222
      NATS_SUBJECT: fedsentinel.edge.insights
      INTERVAL_SEC: "45"
    networks: [fedsentinel_net]

  edge-node-5:
    build:
      context: ../edge
    container_name: fedsentinel-edge-node-5
    depends_on:
      - nats
      - ollama
      - ollama-pull
    environment:
      NODE_ID: edge-5
      REGION: sa-east
      OLLAMA_MODEL: tinyllama:latest
      OLLAMA_URL: http://fedsentinel-ollama:11434
      NATS_URL: nats://fedsentinel-nats:4222
      NATS_SUBJECT: fedsentinel.edge.insights
      INTERVAL_SEC: "45"
    networks: [fedsentinel_net]

  duckdb:
    image: quay.io/duckdb/duckdb:latest
    container_name: fedsentinel-duckdb
    depends_on:
      - central-ingestor
    volumes:
      # must mount the same data folder where edge_insights.jsonl lives
      - fedsentinel_inbox:/data/inbox
      - ./analytics:/analytics:ro
    entrypoint: ["sh", "-lc", "sleep infinity"]

  healer:
    image: python:3.11-slim
    container_name: fedsentinel-healer
    volumes:
      - fedsentinel_inbox:/data/inbox
      - ../analytics:/analytics:ro
    environment:
      HEAL_INTERVAL_SECONDS: "60"
      BRONZE_PATH: "/data/inbox/edge_insights.jsonl"
      SILVER_PATH: "/data/inbox/edge_insights_silver.parquet"
      BADROWS_PATH: "/data/inbox/edge_insights_bad_rows.jsonl"
      METRICS_PATH: "/data/inbox/healer_metrics.jsonl"
    command: >
      bash -lc "pip -q install pandas pyarrow &&
                python /analytics/heal_loop.py"
    restart: unless-stopped


  healer-watchdog:
    image: alpine:3.20
    container_name: fedsentinel-healer-watchdog
    volumes:
      - fedsentinel_inbox:/data/inbox
    depends_on:
      - healer
    restart: unless-stopped
    command:
      - sh
      - -lc
      - |
          echo "[watchdog] started"

          SILVER="/data/inbox/edge_insights_silver.parquet"
          STATUS="/data/inbox/healer_status.json"

          while true; do
            if [ ! -f "$$SILVER" ]; then
              echo "[watchdog] FAIL: silver parquet missing: $$SILVER"
              exit 1
            fi

            now=$$(date +%s)
            mtime=$$(stat -c %Y "$$SILVER" 2>/dev/null || echo 0)
            age=$$(( $$now - $$mtime ))

            if [ "$$mtime" -eq 0 ] || [ "$$age" -gt 120 ]; then
              echo "[watchdog] FAIL: silver parquet stale (age=$${age}s): $$SILVER"
              exit 1
            fi

            if [ -f "$$STATUS" ] && grep -q "\"status\": \"degraded\"" "$$STATUS"; then
              echo "[watchdog] FAIL: healer status degraded"
              tail -n 1 "$$STATUS" || true
              exit 1
            fi

            sleep 30
          done

  dashboard:
    image: python:3.11-slim
    container_name: fedsentinel-dashboard
    ports:
      - "8501:8501"
    volumes:
      - fedsentinel_inbox:/data/inbox
      - ../app:/app
    depends_on:
      - healer
    command: >
      bash -lc "pip -q install streamlit duckdb pandas pyarrow &&
                streamlit run /app/streamlit_app.py --server.address=0.0.0.0 --server.port=8501"
    restart: unless-stopped

networks:
  fedsentinel_net:

volumes:
  fedsentinel_minio_data:
  fedsentinel_inbox:
     name: infra_fedsentinel_inbox
  ollama_data: